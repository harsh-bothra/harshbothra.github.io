<script>
// ── Particle Network ──────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x: -9999, y: -9999 };
  const COUNT = 72, MAX_DIST = 130, TEAL = '0,210,200';

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  function init() {
    particles = [];
    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: rand(0, W), y: rand(0, H),
        vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3),
        r: rand(1.2, 2.5),
      });
    }
  }

  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init();

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Update + draw dots
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

      // Mouse repel
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 90) { p.x += dx / dist * 1.2; p.y += dy / dist * 1.2; }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${TEAL},0.7)`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_DIST) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(${TEAL},${(1 - d/MAX_DIST) * 0.25})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

function MatrixStrip({ side }) {
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ'.split('');
  const cols = 3;
  const colData = Array.from({ length: cols }, (_, i) => ({
    chars: Array.from({ length: 18 }, () => chars[Math.floor(Math.random() * chars.length)]),
    delay: i * 0.4,
  }));
  return (
    <div style={{
      position: 'fixed', top: 0, [side]: 0, bottom: 0,
      width: '48px', zIndex: 0, pointerEvents: 'none', overflow: 'hidden',
      opacity: 0.12,
    }}>
      <style>{`
        @keyframes matrixFall {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(100vh); }
        }
      `}</style>
      {colData.map((col, ci) => (
        <div key={ci} style={{
          position: 'absolute', top: 0, left: `${ci * 16}px`, width: '14px',
          fontFamily: 'var(--mono)', fontSize: '0.62rem', color: 'oklch(0.72 0.16 195)',
          lineHeight: 1.5, letterSpacing: 0,
          animation: `matrixFall ${8 + ci * 2}s linear infinite`,
          animationDelay: `${col.delay + ci * 0.7}s`,
        }}>
          {col.chars.map((c, i) => <div key={i}>{c}</div>)}
        </div>
      ))}
    </div>
  );
}

function useInView(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return visible;
}

function FadeIn({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const visible = useInView(ref);
  return (
    <div ref={ref} style={{
      transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
      opacity: visible ? 1 : 0,
      transform: visible ? 'none' : 'translateY(24px)',
      ...style,
    }}>
      {children}
    </div>
  );
}

function VisitorCounter() {
  const [count, setCount] = useState(null);
  useEffect(() => {
    const stored = localStorage.getItem('hb_visitors');
    const base = 1353029;
    if (stored) {
      setCount(parseInt(stored));
    } else {
      const n = base + Math.floor(Math.random() * 800);
      localStorage.setItem('hb_visitors', n);
      setCount(n);
    }
  }, []);

  return (
    <div style={{
      position: 'fixed', bottom: '1.5rem', right: '1.5rem', zIndex: 50,
      background: 'var(--bg3)', border: '1px solid var(--border)',
      borderRadius: '8px', padding: '0.6rem 1rem',
      display: 'flex', alignItems: 'center', gap: '0.6rem',
      backdropFilter: 'blur(8px)',
    }}>
      <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'var(--teal)', display: 'block', animation: 'pulse 2s ease infinite' }}></span>
      <span style={{ fontFamily: 'var(--mono)', fontSize: '0.72rem', color: 'var(--muted)' }}>
        {count ? count.toLocaleString() : '—'} visitors
      </span>
      <style>{`@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }`}</style>
    </div>
  );
}
